<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KoalaContacts | Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --font-main: "Nunito", Arial, Helvetica, sans-serif;

            --page-bg-start: #edf3f7;
            --page-bg-end: #f9fbfd;

            --card-bg: #ffffff;
            --brand-panel-bg: #f4f8f9;

            --primary: #2f566f;
            --primary-dark: #203a4e;
            --primary-soft: #e8f0f4;

            --accent: #cf6b82;
            --accent-soft: #fde8ee;

            --text-dark: #172535;
            --text-muted: #516475;
            --text-light: #6f7f8d;

            --border: #c9d6df;
            --border-light: #dce5eb;

            --input-bg: #fbfdff;

            --error: #b42318;
            --focus: #0b5fff;

            --shadow: 0 28px 70px rgba(23, 37, 53, 0.16);

            --radius-xl: 30px;
            --radius-lg: 22px;
            --radius-md: 14px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            color-scheme: light;
        }

        body {
            min-height: 100vh;
            font-family: var(--font-main);
            font-weight: 600;
            color: var(--text-dark);
            background:
                radial-gradient(circle at 12% 12%, rgba(47, 86, 111, 0.30), transparent 34%),
                radial-gradient(circle at 88% 82%, rgba(207, 107, 130, 0.32), transparent 34%),
                linear-gradient(135deg, var(--page-bg-start), var(--page-bg-end));
        }

        button,
        input,
        textarea,
        select {
            font: inherit;
        }

        a {
            color: var(--primary-dark);
            font-weight: 900;
            text-decoration-thickness: 2px;
            text-underline-offset: 3px;
        }

        a:hover {
            color: var(--primary);
        }

        a:focus-visible,
        button:focus-visible,
        input:focus-visible {
            outline: 3px solid var(--focus);
            outline-offset: 3px;
        }

        .page {
            min-height: 100vh;
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .login-card {
            width: 100%;
            max-width: 860px;
            display: grid;
            grid-template-columns: minmax(260px, 0.95fr) minmax(0, 1.1fr);
            overflow: hidden;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
        }

        .brand-panel {
            position: relative;
            min-height: 100%;
            padding: 42px 34px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.95), transparent 34%),
                linear-gradient(160deg, #f8fbfc, var(--brand-panel-bg));
            border-right: 1px solid var(--border-light);
        }

        .brand-panel::before {
            content: "";
            position: absolute;
            width: 180px;
            height: 180px;
            right: -70px;
            top: -65px;
            border-radius: 999px;
            background: rgba(207, 107, 130, 0.22);
        }

        .brand-panel::after {
            content: "";
            position: absolute;
            width: 150px;
            height: 150px;
            left: -60px;
            bottom: -55px;
            border-radius: 999px;
            background: rgba(47, 86, 111, 0.18);
        }

        .brand-content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .mascot-frame {
            width: 190px;
            min-height: 126px;
            margin: 0 auto 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                linear-gradient(#ffffff, #ffffff) padding-box,
                linear-gradient(135deg, rgba(47, 86, 111, 0.32), rgba(207, 107, 130, 0.34)) border-box;
            border: 1px solid transparent;
            border-radius: 28px;
            box-shadow: 0 18px 38px rgba(47, 86, 111, 0.13);
            padding: 14px 16px;
        }

        .brand img {
            width: 154px;
            max-width: 100%;
            height: auto;
            display: block;
        }

        .brand-kicker {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            padding: 7px 12px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: #8d3348;
            font-size: 0.78rem;
            font-weight: 900;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .brand h1 {
            font-size: clamp(2rem, 4vw, 2.6rem);
            line-height: 1.05;
            font-weight: 900;
            color: var(--text-dark);
            letter-spacing: -1.4px;
            margin-bottom: 12px;
        }

        .brand p {
            max-width: 310px;
            margin: 0 auto;
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 700;
            line-height: 1.55;
        }

        .form-panel {
            padding: 48px 42px 36px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-heading {
            margin-bottom: 24px;
        }

        .form-heading h2 {
            font-size: 1.65rem;
            line-height: 1.2;
            font-weight: 900;
            color: var(--text-dark);
            letter-spacing: -0.7px;
            margin-bottom: 8px;
        }

        .form-heading p {
            color: var(--text-muted);
            font-size: 0.98rem;
            font-weight: 700;
            line-height: 1.5;
        }

        .required-note {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 800;
            margin-bottom: 22px;
        }

        .required-note span,
        .required {
            color: var(--error);
            font-weight: 900;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-size: 0.96rem;
            font-weight: 900;
        }

        .form-input {
            width: 100%;
            min-height: 52px;
            padding: 14px 15px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--input-bg);
            color: var(--text-dark);
            font-size: 1rem;
            font-weight: 700;
            transition:
                border-color 0.2s ease,
                box-shadow 0.2s ease,
                background-color 0.2s ease;
        }

        .form-input::placeholder {
            color: #7b8b99;
            font-weight: 600;
        }

        .form-input:hover {
            border-color: var(--primary);
        }

        .form-input:focus {
            background: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(47, 86, 111, 0.16);
        }

        .login-button {
            width: 100%;
            min-height: 52px;
            margin-top: 6px;
            border: none;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #ffffff;
            padding: 14px 18px;
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: 0.01em;
            cursor: pointer;
            box-shadow: 0 14px 26px rgba(32, 58, 78, 0.26);
            transition:
                transform 0.18s ease,
                box-shadow 0.18s ease,
                background 0.18s ease;
        }

        .login-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 34px rgba(32, 58, 78, 0.33);
        }

        .login-button:active {
            transform: translateY(0);
            box-shadow: 0 10px 20px rgba(32, 58, 78, 0.24);
        }

        .signup-text {
            margin-top: 22px;
            color: var(--text-muted);
            font-size: 0.96rem;
            font-weight: 700;
            text-align: center;
        }

        #loginResult {
            display: block;
            min-height: 22px;
            margin-top: 16px;
            color: var(--error);
            font-size: 0.95rem;
            font-weight: 900;
            text-align: center;
        }

        .footer-note {
            margin-top: 20px;
            color: var(--text-light);
            font-size: 0.83rem;
            font-weight: 800;
            text-align: center;
        }
        .mascot-frame {
        position: relative;
        cursor: pointer;
        user-select: none;
        transition:
            transform 0.18s ease,
            box-shadow 0.18s ease;
    }

    .mascot-frame:hover {
        transform: translateY(-2px);
        box-shadow: 0 22px 46px rgba(47, 86, 111, 0.18);
    }

    .koala-mascot {
        transform-origin: 50% 85%;
        pointer-events: none;
    }

    .koala-mascot.is-wiggling {
        animation: koalaWiggle 0.65s ease-in-out;
    }

    .koala-bubble {
        position: absolute;
        top: -32px;
        left: 50%;
        max-width: 180px;
        padding: 8px 12px;
        border: 2px solid var(--primary-soft);
        border-radius: 999px;
        background: #ffffff;
        color: var(--primary-dark);
        font-size: 0.82rem;
        font-weight: 900;
        line-height: 1.2;
        text-align: center;
        box-shadow: 0 12px 24px rgba(47, 86, 111, 0.16);
        opacity: 0;
        transform: translate(-50%, -6px) scale(0.95);
        pointer-events: none;
        transition:
            opacity 0.2s ease,
            transform 0.2s ease;
    }

    .koala-bubble::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -8px;
        width: 14px;
        height: 14px;
        background: #ffffff;
        border-right: 2px solid var(--primary-soft);
        border-bottom: 2px solid var(--primary-soft);
        transform: translateX(-50%) rotate(45deg);
    }

    .koala-bubble.is-showing {
        opacity: 1;
        transform: translate(-50%, -14px) scale(1);
    }

    @keyframes koalaWiggle {
        0% {
            transform: rotate(0deg) translateY(0) scale(1);
        }

        15% {
            transform: rotate(-8deg) translateY(-3px) scale(1.04);
        }

        30% {
            transform: rotate(8deg) translateY(-5px) scale(1.05);
        }

        45% {
            transform: rotate(-6deg) translateY(-3px) scale(1.04);
        }

        60% {
            transform: rotate(5deg) translateY(-2px) scale(1.03);
        }

        75% {
            transform: rotate(-3deg) translateY(-1px) scale(1.02);
        }

        100% {
            transform: rotate(0deg) translateY(0) scale(1);
        }
    }

        @media (max-width: 760px) {
            .login-card {
                max-width: 480px;
                grid-template-columns: 1fr;
            }

            .brand-panel {
                padding: 34px 26px 28px;
                border-right: none;
                border-bottom: 1px solid var(--border-light);
            }

            .mascot-frame {
                width: 170px;
                min-height: 112px;
                margin-bottom: 18px;
            }

            .brand img {
                width: 138px;
            }

            .brand p {
                max-width: 360px;
            }

            .form-panel {
                padding: 34px 28px 30px;
            }
        }

        @media (max-width: 480px) {
            .page {
                padding: 18px 12px;
            }

            .login-card {
                border-radius: 24px;
            }

            .brand-panel {
                padding: 28px 20px 24px;
            }

            .form-panel {
                padding: 28px 20px 24px;
            }

            .brand h1 {
                font-size: 1.9rem;
                letter-spacing: -1px;
            }

            .form-heading h2 {
                font-size: 1.42rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                transition: none !important;
                animation: none !important;
            }
        }

        @media (prefers-contrast: more) {
            .login-card,
            .mascot-frame,
            .form-input {
                border-color: #63798a;
            }

            .brand p,
            .form-heading p,
            .required-note,
            .signup-text,
            .footer-note {
                color: #33485a;
            }
        }

        .koala-mascot.is-wiggling {
            animation: koalaWiggle 0.65s ease-in-out;
        }

        @keyframes koalaWiggle {
            0% { transform: rotate(0deg) translateY(0) scale(1); }
            15% { transform: rotate(-8deg) translateY(-3px) scale(1.04); }
            30% { transform: rotate(8deg) translateY(-5px) scale(1.05); }
            45% { transform: rotate(-6deg) translateY(-3px) scale(1.04); }
            60% { transform: rotate(5deg) translateY(-2px) scale(1.03); }
            75% { transform: rotate(-3deg) translateY(-1px) scale(1.02); }
            100% { transform: rotate(0deg) translateY(0) scale(1); }
        }
    </style>
</head>

<body>
    <main class="page">
        <section class="login-card" aria-labelledby="pageTitle">
            <div class="brand-panel">
                <div class="brand-content brand">
                    <div
                        class="mascot-frame"
                        id="koalaButton"
                        role="button"
                        tabindex="0"
                        aria-label="Make the koala talk"
                    >
                        <div class="koala-bubble" id="koalaBubble" aria-live="polite">
                            Click me!
                        </div>

                        <img
                            class="koala-mascot"
                            id="koalaMascot"
                            src="images/koala.png"
                            alt="KoalaContacts koala mascot"
                            width="154"
                            height="84"
                        />
                    </div>

                    <p class="brand-kicker">Contact manager</p>

                    <h1 id="pageTitle">KoalaContacts</h1>

                    <p>
                        A simple, friendly workspace for keeping your contacts organized.
                    </p>
                </div>
            </div>

            <div class="form-panel">
                <div class="form-heading">
                    <h2>Welcome back</h2>
                    <p id="loginHelp">
                        Sign in to continue managing your contacts.
                    </p>
                </div>

                <p class="required-note" id="requiredNote">
                    <span aria-hidden="true">*</span> Required fields
                </p>

                <form onsubmit="event.preventDefault(); doLogin();" aria-describedby="loginHelp requiredNote loginResult">
                    <div class="form-group">
                        <label class="form-label" for="loginName">
                            Username <span class="required" aria-hidden="true">*</span>
                        </label>

                        <input
                            class="form-input"
                            type="text"
                            id="loginName"
                            name="username"
                            placeholder="Enter your username"
                            autocomplete="username"
                            autocapitalize="none"
                            spellcheck="false"
                            required
                            aria-required="true"
                        />
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="loginPassword">
                            Password <span class="required" aria-hidden="true">*</span>
                        </label>

                        <input
                            class="form-input"
                            type="password"
                            id="loginPassword"
                            name="password"
                            placeholder="Enter your password"
                            autocomplete="current-password"
                            required
                            aria-required="true"
                        />
                    </div>

                    <button class="login-button" id="loginButton" type="submit">
                        Log In
                    </button>
                </form>

                <p class="signup-text">
                    Don’t have an account?
                    <a href="signup.html">Sign up here</a>
                </p>

                <p id="loginResult" role="status" aria-live="polite"></p>

                <p class="footer-note">
                    KoalaContacts • Simple contact management
                </p>
            </div>
        </section>
    </main>

    <script src="js/md5.js"></script>
    <script src="js/code.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const koalaButton = document.getElementById("koalaButton");
            const koalaMascot = document.getElementById("koalaMascot");
            const koalaBubble = document.getElementById("koalaBubble");
    
            if (!koalaButton || !koalaMascot || !koalaBubble) {
                return;
            }
    
            const koalaPhrases = [
                "Yay!",
                "Hello!",
                "Chill on me!",
                "I'm in pain!",
                "You need help?",
                "Relax bucko",
                "Trust me",
                "Crikey Mate",
                "Carlos Rocks!!",
                "Keep Looking!",
                "❤️"
            ];
    
            let lastPhraseIndex = -1;
            let bubbleTimer;
    
            function getRandomPhrase() {
                let randomIndex = Math.floor(Math.random() * koalaPhrases.length);
    
                if (koalaPhrases.length > 1) {
                    while (randomIndex === lastPhraseIndex) {
                        randomIndex = Math.floor(Math.random() * koalaPhrases.length);
                    }
                }
    
                lastPhraseIndex = randomIndex;
                return koalaPhrases[randomIndex];
            }
    
            function makeKoalaTalk() {
                koalaMascot.classList.remove("is-wiggling");
                void koalaMascot.offsetWidth;
                koalaMascot.classList.add("is-wiggling");
    
                koalaBubble.textContent = getRandomPhrase();
                koalaBubble.classList.add("is-showing");
    
                clearTimeout(bubbleTimer);
    
                bubbleTimer = setTimeout(function () {
                    koalaBubble.classList.remove("is-showing");
                }, 2200);
            }
    
            koalaButton.addEventListener("pointerdown", makeKoalaTalk);
    
            koalaButton.addEventListener("keydown", function (event) {
                if (event.key === "Enter" || event.key === " ") {
                    event.preventDefault();
                    makeKoalaTalk();
                }
            });
    
            koalaMascot.addEventListener("animationend", function () {
                koalaMascot.classList.remove("is-wiggling");
            });
        });
    </script>

    <script>
        const koalaButton = document.getElementById("koalaButton");
        const koalaMascot = document.getElementById("koalaMascot");

        function wiggleKoala() {
            koalaMascot.classList.remove("is-wiggling");
            void koalaMascot.offsetWidth;
            koalaMascot.classList.add("is-wiggling");
        }

        koalaButton.addEventListener("click", wiggleKoala);
    </script>
</body>
</html>
