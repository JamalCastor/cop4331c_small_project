<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body onload="readCookie();">
    <div class="min-vh-100 d-flex justify-content-center align-items-center bg-light px-3 py-4">
        <div class="card shadow-sm p-4 w-100" style="max-width: 700px;">
            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <p class="mb-0 fw-semibold" id="userName"></p>
                    <button class="btn btn-outline-secondary btn-sm" onclick="doLogout();">
                        Log Out
                    </button>
                </div>

                <!-- Search Contacts -->
                <div class="mb-4">
                    <label class="form-label">Search Contacts</label>

                    <input 
                        class="form-control mb-3" 
                        type="text" 
                        id="searchText" 
                        placeholder="Search by first name"
                    >

                    <button class="btn btn-primary" onclick="searchContacts();">
                        Search Contacts
                    </button>

                    <p class="text-center text-muted mt-3 mb-0" id="contactSearchResult"></p>
                </div>

                <hr>

                <!-- Contact Results -->
                <div class="mt-4 mb-4">
                    <h5>Contacts</h5>
                    <p class="text-muted small">
                        Search results will appear here. Use Edit or Delete next to each contact.
                    </p>

                    <div id="contactList"></div>

                    <p class="text-center text-muted mt-3 mb-0" id="contactDeleteResult"></p>
                </div>

                <hr>

                <!-- Add Contact -->
                <div class="mb-4">
                    <h5 class="mb-2">Add Contact</h5>

                    <p class="text-muted small mb-4">
                        <span class="text-danger">*</span> Required fields
                    </p>

                    <form onsubmit="event.preventDefault(); addContact();">

                        <div class="mb-3">
                            <label class="form-label" for="contactFirstName">
                                First Name <span class="text-danger">*</span>
                            </label>
                            <input 
                                class="form-control" 
                                type="text" 
                                id="contactFirstName" 
                                placeholder="First Name"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="contactLastName">
                                Last Name <span class="text-danger">*</span>
                            </label>
                            <input 
                                class="form-control" 
                                type="text" 
                                id="contactLastName" 
                                placeholder="Last Name"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="contactPhone">
                                Phone <span class="text-danger">*</span>
                            </label>
                            <input 
                                class="form-control" 
                                type="text" 
                                id="contactPhone" 
                                placeholder="Phone"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="contactEmail">
                                Email <span class="text-danger">*</span>
                            </label>
                            <input 
                                class="form-control" 
                                type="email" 
                                id="contactEmail" 
                                placeholder="Email"
                                required
                            >
                        </div>

                        <button class="btn btn-success" type="submit">
                            Add Contact
                        </button>

                    </form>

                    <p class="text-center text-muted mt-3 mb-0" id="contactAddResult"></p>
                </div>

            </div>
        </div>
    </div>

    <script type="text/javascript" src="js/code.js"></script>
</body>
</html>
