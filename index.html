<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KoalaContacts | Login</title>

    <style>
        :root {
            --bg-main: #f4f7fb;
            --bg-card: rgba(255, 255, 255, 0.92);
            --primary: #5b7c99;
            --primary-dark: #46627c;
            --accent: #f3a8b8;
            --text-dark: #24313f;
            --text-muted: #6f7b88;
            --border: #dbe3ea;
            --input-bg: #f9fbfd;
            --shadow: 0 20px 50px rgba(47, 67, 87, 0.12);
            --radius-lg: 24px;
            --radius-md: 14px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(91, 124, 153, 0.15), transparent 30%),
                radial-gradient(circle at bottom right, rgba(243, 168, 184, 0.18), transparent 28%),
                linear-gradient(135deg, #eef3f8, #f8fafc);
            color: var(--text-dark);
        }

        .page {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 32px 16px;
        }

        .login-card {
            width: 100%;
            max-width: 460px;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            padding: 34px 30px 28px;
        }

        .brand {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand img {
            width: 120px;
            max-width: 100%;
            display: block;
            margin: 0 auto 16px;
        }

        .brand h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .brand p {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .required-note {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .required-note span {
            color: #d9534f;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .form-label .required {
            color: #d9534f;
        }

        .form-input {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--input-bg);
            font-size: 1rem;
            color: var(--text-dark);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .form-input:focus {
            background: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(91, 124, 153, 0.15);
        }

        .login-button {
            width: 100%;
            border: none;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 14px 18px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
            transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
            box-shadow: 0 10px 20px rgba(70, 98, 124, 0.22);
        }

        .login-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 24px rgba(70, 98, 124, 0.28);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .signup-text {
            text-align: center;
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 20px;
        }

        .signup-text a {
            color: var(--primary-dark);
            text-decoration: none;
            font-weight: 700;
        }

        .signup-text a:hover {
            text-decoration: underline;
        }

        #loginResult {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #c0392b;
            min-height: 20px;
        }

        .footer-note {
            text-align: center;
            margin-top: 18px;
            font-size: 0.8rem;
            color: #94a0ad;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 28px 20px 24px;
            }

            .brand h1 {
                font-size: 1.7rem;
            }

            .brand img {
                width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="login-card">
            <div class="brand">
                <img src="images/koala.png" alt="KoalaContacts mascot" />
                <h1>KoalaContacts</h1>
                <p>
                    Sign in to manage your contacts in one simple, friendly workspace.
                </p>
            </div>

            <p class="required-note">
                <span>*</span> Required fields
            </p>

            <form onsubmit="event.preventDefault(); doLogin();">
                <div class="form-group">
                    <label class="form-label" for="loginName">
                        Username <span class="required">*</span>
                    </label>
                    <input
                        class="form-input"
                        type="text"
                        id="loginName"
                        placeholder="Enter your username"
                        required
                    />
                </div>

                <div class="form-group">
                    <label class="form-label" for="loginPassword">
                        Password <span class="required">*</span>
                    </label>
                    <input
                        class="form-input"
                        type="password"
                        id="loginPassword"
                        placeholder="Enter your password"
                        required
                    />
                </div>

                <button class="login-button" id="loginButton" type="submit">
                    Log In
                </button>
            </form>

            <p class="signup-text">
                Don’t have an account?
                <a href="signup.html">Sign up here</a>
            </p>

            <span id="loginResult"></span>

            <p class="footer-note">
                KoalaContacts • Simple contact management
            </p>
        </div>
    </div>

    <script src="js/md5.js"></script>
    <script src="js/code.js"></script>
</body>
</html>
