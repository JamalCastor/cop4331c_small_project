<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="min-vh-100 d-flex justify-content-center align-items-center bg-light px-3">
         <div class="card shadow-sm p-4 w-100" style="max-width: 550px;">
            <div class="card-body">
                <h1 class="text-center mb-5">Lamp Project</h1>
                <div class="mb-4">
                    <label class="form-label">Username</label>
                    <input class="form-control" type="text" id="loginName" placeholder="Enter Username"/>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input class="form-control mb-4" id="loginPassword" placeholder="Enter Password"/>
                </div>
                <button class="btn btn-primary py-2 mt-2 w-100" id="loginButton" onclick="doLogin()">Submit</button>
                <p>
                    Don't have an account?
                    <a href="signup.html">Sign up here</a>
                </p>
                <span class="d-block text-center mt-3" id="loginResult"></span>
            </div>
         </div>
    </div>
    <script src="js/md5.js"></script>
    <script type="text/javascript" src="js/code.js"></script>
</body>
</html>
