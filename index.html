<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="min-vh-100 d-flex justify-content-center align-items-center bg-light px-3">
        <div class="card shadow-sm p-4 w-100" style="max-width: 550px;">
            <div class="card-body">

                <h1 class="text-center mb-3">Contact Manager</h1>

                <p class="text-muted small text-center mb-5">
                    <span class="text-danger">*</span> Required fields
                </p>

                <form onsubmit="event.preventDefault(); doLogin();">

                    <div class="mb-4">
                        <label class="form-label" for="loginName">
                            Username <span class="text-danger">*</span>
                        </label>
                        <input 
                            class="form-control" 
                            type="text" 
                            id="loginName" 
                            placeholder="Enter Username"
                            required
                        />
                    </div>

                    <div class="mb-4">
                        <label class="form-label" for="loginPassword">
                            Password <span class="text-danger">*</span>
                        </label>
                        <input 
                            class="form-control mb-4" 
                            type="password" 
                            id="loginPassword" 
                            placeholder="Enter Password"
                            required
                        />
                    </div>

                    <button class="btn btn-primary py-2 mt-2 w-100" id="loginButton" type="submit">
                        Submit
                    </button>

                </form>

                <p class="mt-3">
                    Don't have an account?
                    <a href="signup.html">Sign up here</a>
                </p>

                <span class="d-block text-center mt-3" id="loginResult"></span>

            </div>
        </div>
    </div>

    <script src="js/md5.js"></script>
    <script type="text/javascript" src="js/code.js"></script>
</body>
</html>
