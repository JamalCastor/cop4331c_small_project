<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="min-vh-100 d-flex justify-content-center align-items-center bg-light px-3">
         <div class="card shadow-sm p-4 w-100" style="max-width: 550px;">
            <div class="card-body">
                <button class="btn btn-outline-secondary btn-sm mb-4">log out</button>
                <div class="mb-4">
                    <label class="form-label">Search</label>
                    <input class="form-control mb-4" type="text" id="searchText" placeholder="Search for a color"/>
                    <button class="btn btn-primary" onclick="searchColor()">Search for Color</button>
                    <p class="text-center text-muted mt-3 mb-0" id="colorSearchResult"></p>
                </div>
                <div class="mb-4">
                    <label class="form-label">Color Add</label>
                    <input class="form-control mb-4" id="colorText" placeholder="Enter Password"/>
                    <button class="btn btn-primary" onclick="addColor()">Add Color</button>
                    <p class="text-center text-muted mt-3 mb-0" id="colorAddResult"></p>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="js/code.js"></script>
</body>


</html>
