<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="min-vh-100 d-flex justify-content-center align-items-center bg-light px-3">
         <div class="card shadow-sm p-4 w-100" style="max-width: 550px;">
            <div class="card-body">
                <button class="btn btn-primary py-2 mt-2 w-100 mb-4" id="loginButton" onclick="doLogin()">Log out</button>

                <div class="mb-4">
                    <label class="form-label">Search for a color</label>
                    <input class="form-control" type="text" id="loginName" placeholder="Enter Username"/>
                </div>
                <div class="mb-4">
                    <label class="form-label">Color to add</label>
                    <input class="form-control mb-4" id="loginPassword" placeholder="Enter Password"/>
                </div>

            </div>
        </div>
    </div>
</body>

</html>
