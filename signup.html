<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="text/javascript" src="js/code.js"></script>
</head>

<body>
    <div class="min-vh-100 d-flex justify-content-center align-items-center bg-light px-3">
        <div class="card shadow-sm p-4 w-100" style="max-width: 450px;">
            <div class="card-body">

                <h1 class="h3 text-center mb-4">Create Account</h1>

                <input class="form-control mb-3" type="text" id="signupFirstName" placeholder="First Name">
                <input class="form-control mb-3" type="text" id="signupLastName" placeholder="Last Name">
                <input class="form-control mb-3" type="text" id="signupLogin" placeholder="Username">
                <input class="form-control mb-3" type="password" id="signupPassword" placeholder="Password">

                <button class="btn btn-primary w-100" type="button" onclick="doSignup();">
                    Sign Up
                </button>

                <p class="text-center text-muted mt-3 mb-0" id="signupResult"></p>

                <p class="text-center mt-4 mb-0">
                    Already have an account?
                    <a href="index.html">Log in here</a>
                </p>

            </div>
        </div>
    </div>
</body>
</html>
