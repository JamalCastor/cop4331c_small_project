<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <script type="text/javascript" src="js/code.js"></script>
</head>
<body>

    <h1>Create Account</h1>

    <input type="text" id="signupFirstName" placeholder="First Name"><br>
    <input type="text" id="signupLastName" placeholder="Last Name"><br>
    <input type="text" id="signupLogin" placeholder="Username"><br>
    <input type="password" id="signupPassword" placeholder="Password"><br>

    <button type="button" onclick="doSignup();">Sign Up</button>

    <p id="signupResult"></p>

    <p>
        Already have an account?
        <a href="index.html">Log in here</a>
    </p>

</body>
</html>
