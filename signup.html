<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KoalaContacts | Sign Up</title>

    <style>
        :root {
            --bg-card: #ffffff;
            --primary: #2f526f;
            --primary-dark: #243f56;
            --accent: #d85f78;
            --text-dark: #1f2933;
            --text-muted: #52616f;
            --border: #b8c4cf;
            --input-bg: #ffffff;
            --error: #b42318;
            --success: #146c43;
            --focus: #0b5fff;
            --shadow: 0 20px 50px rgba(47, 67, 87, 0.16);
            --radius-lg: 24px;
            --radius-md: 14px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text-dark);
            background:
                radial-gradient(circle at top left, rgba(47, 82, 111, 0.16), transparent 30%),
                radial-gradient(circle at bottom right, rgba(216, 95, 120, 0.18), transparent 28%),
                linear-gradient(135deg, #eef3f8, #f8fafc);
        }

        a {
            color: var(--primary-dark);
            font-weight: 700;
        }

        a:hover {
            text-decoration-thickness: 2px;
        }

        a:focus-visible,
        button:focus-visible,
        input:focus-visible {
            outline: 3px solid var(--focus);
            outline-offset: 3px;
        }

        .page {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 32px 16px;
        }

        .signup-card {
            width: 100%;
            max-width: 480px;
            background: var(--bg-card);
            border: 1px solid #d8e0e8;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 34px 30px 28px;
        }

        .brand {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand img {
            width: 110px;
            height: auto;
            display: block;
            margin: 0 auto 16px;
        }

        .brand h1 {
            font-size: 2rem;
            line-height: 1.2;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .brand p {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .required-note {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .required-note span,
        .required {
            color: var(--error);
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .form-input {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--input-bg);
            font-size: 1rem;
            color: var(--text-dark);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-input:hover {
            border-color: var(--primary);
        }

        .form-input:focus {
            border-color: var(--focus);
            box-shadow: 0 0 0 4px rgba(11, 95, 255, 0.14);
            outline: none;
        }

        .signup-button {
            width: 100%;
            border: none;
            border-radius: var(--radius-md);
            background: var(--primary);
            color: #ffffff;
            padding: 14px 18px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
            box-shadow: 0 10px 20px rgba(47, 82, 111, 0.24);
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        .signup-button:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 14px 24px rgba(47, 82, 111, 0.3);
        }

        .signup-button:active {
            transform: translateY(0);
        }

        #signupResult {
            text-align: center;
            margin-top: 16px;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--error);
            min-height: 22px;
        }

        .login-text {
            text-align: center;
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 20px;
        }

        .footer-note {
            text-align: center;
            margin-top: 18px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        @media (max-width: 480px) {
            .signup-card {
                padding: 28px 20px 24px;
            }

            .brand h1 {
                font-size: 1.7rem;
            }

            .brand img {
                width: 100px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                transition: none !important;
                animation: none !important;
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <section class="signup-card" aria-labelledby="pageTitle">
            <div class="brand">
                <img
                    src="images/koala.png"
                    alt="KoalaContacts koala mascot"
                    width="110"
                    height="62"
                />

                <h1 id="pageTitle">Create Account</h1>

                <p>
                    Join KoalaContacts and start organizing your contacts in one simple workspace.
                </p>
            </div>

            <p class="required-note" id="requiredNote">
                <span aria-hidden="true">*</span> Required fields
            </p>

            <form onsubmit="event.preventDefault(); doSignup();" aria-describedby="requiredNote signupResult">
                <div class="form-group">
                    <label class="form-label" for="signupFirstName">
                        First Name <span class="required" aria-hidden="true">*</span>
                    </label>

                    <input
                        class="form-input"
                        type="text"
                        id="signupFirstName"
                        name="firstName"
                        placeholder="Enter your first name"
                        autocomplete="given-name"
                        required
                        aria-required="true"
                    />
                </div>

                <div class="form-group">
                    <label class="form-label" for="signupLastName">
                        Last Name <span class="required" aria-hidden="true">*</span>
                    </label>

                    <input
                        class="form-input"
                        type="text"
                        id="signupLastName"
                        name="lastName"
                        placeholder="Enter your last name"
                        autocomplete="family-name"
                        required
                        aria-required="true"
                    />
                </div>

                <div class="form-group">
                    <label class="form-label" for="signupLogin">
                        Username <span class="required" aria-hidden="true">*</span>
                    </label>

                    <input
                        class="form-input"
                        type="text"
                        id="signupLogin"
                        name="username"
                        placeholder="Choose a username"
                        autocomplete="username"
                        required
                        aria-required="true"
                    />
                </div>

                <div class="form-group">
                    <label class="form-label" for="signupPassword">
                        Password <span class="required" aria-hidden="true">*</span>
                    </label>

                    <input
                        class="form-input"
                        type="password"
                        id="signupPassword"
                        name="password"
                        placeholder="Create a password"
                        autocomplete="new-password"
                        required
                        aria-required="true"
                    />
                </div>

                <button class="signup-button" type="submit">
                    Sign Up
                </button>
            </form>

            <p id="signupResult" role="status" aria-live="polite"></p>

            <p class="login-text">
                Already have an account?
                <a href="index.html">Log in here</a>
            </p>

            <p class="footer-note">
                KoalaContacts • Simple contact management
            </p>
        </section>
    </main>

    <script src="js/code.js"></script>
</body>
</html>
