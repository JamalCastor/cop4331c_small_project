<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="text/javascript" src="js/code.js"></script>
</head>

<body>
    <div class="min-vh-100 d-flex justify-content-center align-items-center bg-light px-3">
        <div class="card shadow-sm p-4 w-100" style="max-width: 450px;">
            <div class="card-body">

                <h1 class="h3 text-center mb-3">Create Account</h1>

                <p class="text-muted small text-center mb-4">
                    <span class="text-danger">*</span> Required fields
                </p>

                <form onsubmit="event.preventDefault(); doSignup();">

                    <div class="mb-3">
                        <label class="form-label" for="signupFirstName">
                            First Name <span class="text-danger">*</span>
                        </label>
                        <input 
                            class="form-control" 
                            type="text" 
                            id="signupFirstName" 
                            placeholder="First Name"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="signupLastName">
                            Last Name <span class="text-danger">*</span>
                        </label>
                        <input 
                            class="form-control" 
                            type="text" 
                            id="signupLastName" 
                            placeholder="Last Name"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="signupLogin">
                            Username <span class="text-danger">*</span>
                        </label>
                        <input 
                            class="form-control" 
                            type="text" 
                            id="signupLogin" 
                            placeholder="Username"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="signupPassword">
                            Password <span class="text-danger">*</span>
                        </label>
                        <input 
                            class="form-control" 
                            type="password" 
                            id="signupPassword" 
                            placeholder="Password"
                            required
                        >
                    </div>

                    <button class="btn btn-primary w-100 mt-2" type="submit">
                        Sign Up
                    </button>

                </form>

                <p class="text-center text-muted mt-3 mb-0" id="signupResult"></p>

                <p class="text-center mt-4 mb-0">
                    Already have an account?
                    <a href="index.html">Log in here</a>
                </p>

            </div>
        </div>
    </div>
</body>
</html>
